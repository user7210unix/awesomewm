# ~/.config/alacritty/alacritty.toml

general.live_config_reload = true

general.import = [
    "~/.config/alacritty/blue_beige.toml"
]

[env]
TERM = "xterm-256color"

[window]
padding = { x = 10, y = 10 }
dynamic_padding = true
decorations = "Full"
opacity = 0.97
blur = true
startup_mode = "Windowed"
dynamic_title = true

[scrolling]
history = 100000
multiplier = 5

[cursor]
style = { shape = "Beam", blinking = "Off" }
unfocused_hollow = true
thickness = 0.18

[font]
normal = { family = "Terminus", style = "Regular" }
size = 13.0
builtin_box_drawing = true


[font.offset]
x = 0
y = 2

[font.glyph_offset]
x = 0
y = 0

[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

[terminal]
osc52 = "OnlyCopy"

[bell]
animation = "EaseOutExpo"
duration = 0
